name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 10m
          script: |
            # Load node (nvm / fnm / system)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            [ -s "$HOME/.fnm/fnm" ] && eval "$($HOME/.fnm/fnm env)"
            export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
            source ~/.bashrc 2>/dev/null || true
            node -v && npm -v
            cd /opt/strategy-platform-frontend
            git pull origin main
            npm ci
            npm run build
            # Sync dist to OpenResty serving directory
            rm -rf /opt/1panel/apps/openresty/openresty/www/sites/8.209.238.108/dist
            cp -r dist /opt/1panel/apps/openresty/openresty/www/sites/8.209.238.108/dist
            echo "Deploy complete."
            ls -la /opt/1panel/apps/openresty/openresty/www/sites/8.209.238.108/dist/
